{% extends "main_pages/base.html" %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="benefit-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="section-title mb-1">Регистрация</h1>
                        <p class="text-muted small">Создайте аккаунт для обучения</p>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-500">Имя</label>
                            <input type="text" class="form-control" placeholder="Иван" style="border: 1px solid var(--mp-border); border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-500">Фамилия</label>
                            <input type="text" class="form-control" placeholder="Иванов" style="border: 1px solid var(--mp-border); border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-500">Email</label>
                            <input type="email" class="form-control" placeholder="email@example.com" style="border: 1px solid var(--mp-border); border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-500">Пароль</label>
                            <input type="password" class="form-control" placeholder="••••••••" style="border: 1px solid var(--mp-border); border-radius: 8px;">
                        </div>
                        <div class="mb-4">
                            <label class="form-check small">
                                <input type="checkbox" class="form-check-input">
                                <span class="form-check-label">Согласен с <a href="#" style="color: var(--mp-accent);">условиями использования</a></span>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-hero w-100 mb-3">Зарегистрироваться</button>
                        <p class="text-center text-muted small mb-0">
                            Уже есть аккаунт? <a href="{% url 'login' %}" style="color: var(--mp-accent); font-weight: 500;">Войти</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
